name: Release

# Merging a PR into `main` creates a `push` event; direct pushes to `main` are covered too.
on:
  push:
    branches:
      - main
      - dev # for testing

concurrency:
  group: release-main
  cancel-in-progress: false

permissions:
  contents: write

env:
  DOCKER_IMAGE_NAME: llmate
  # Opt into Node 24 for JS-based actions until it is the default (see GitHub changelog).
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Tests, checks, and production build
        run: make ci

      - name: Next version from git history (conventional commits)
        id: semver
        uses: PaulHatch/semantic-version@v5.4.0
        with:
          tag_prefix: v
          major_pattern: "/(^|\\n)BREAKING CHANGE:|^[a-z]+(\\([^)]+\\))?!:/m"
          minor_pattern: "/^feat(\\([^)]+\\))?:/m"
          search_commit_body: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Docker image metadata (tags)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.DOCKER_IMAGE_NAME }}
          tags: |
            type=raw,value=${{ steps.semver.outputs.version }}
            type=raw,value=${{ steps.semver.outputs.version_tag }}
            type=raw,value=latest

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Export image tarball for GitHub Release
        env:
          VERSION: ${{ steps.semver.outputs.version }}
        run: |
          set -euo pipefail
          IMG="${{ secrets.DOCKERHUB_USERNAME }}/${DOCKER_IMAGE_NAME}:${VERSION}"
          docker pull "$IMG"
          docker save "$IMG" | gzip -1 > "llmate-${VERSION}.tar.gz"
          ls -la "llmate-${VERSION}.tar.gz"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.semver.outputs.version_tag }}
          name: ${{ steps.semver.outputs.version_tag }}
          body: |
            **Docker Hub:** `${{ secrets.DOCKERHUB_USERNAME }}/${{ env.DOCKER_IMAGE_NAME }}:${{ steps.semver.outputs.version }}`

            ```bash
            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.DOCKER_IMAGE_NAME }}:${{ steps.semver.outputs.version }}
            ```

            Commit: `${{ github.sha }}`
          files: llmate-${{ steps.semver.outputs.version }}.tar.gz
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
